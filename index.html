<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Pulsar | The Memory Maze</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     RESET
     ============================================================ */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #050505;            /* pitch black for neon contrast */
    font-family: 'Roboto Mono', monospace;
    color: #eafcff;
    touch-action: none;
  }

  /* ============================================================
     STAGE
     ============================================================ */
  #stage {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: #050505;
    overflow: hidden;
  }

  /* Screen-shake wrapper */
  #shaker {
    position: absolute;
    inset: 0;
    will-change: transform;
  }
  #shaker.shake {
    animation: shake 0.32s cubic-bezier(.36,.07,.19,.97) both;
  }
  @keyframes shake {
    10%, 90% { transform: translate3d(-2px, 0, 0); }
    20%, 80% { transform: translate3d(3px, 0, 0); }
    30%, 50%, 70% { transform: translate3d(-5px, 1px, 0); }
    40%, 60% { transform: translate3d(5px, -1px, 0); }
  }

  /* ============================================================
     PROGRESS BAR (1px micro timer)
     ============================================================ */
  #progress-track {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    z-index: 100;
    pointer-events: none;
  }
  #progress-bar {
    height: 100%;
    width: 100%;
    transform-origin: left center;
    background: #00ffff;
    box-shadow: 0 0 8px #00ffff, 0 0 4px #00ffff;
    transition: background 0.4s ease, box-shadow 0.4s ease;
  }
  #progress-bar.dash {
    background: #ff007f;
    box-shadow: 0 0 8px #ff007f, 0 0 4px #ff007f;
  }

  /* ============================================================
     MAZE GRID
     ============================================================ */
  #maze {
    position: absolute;
    transition: opacity 0.6s ease-in-out;
  }
  #maze.transitioning { opacity: 0; }

  /* Walls: thin neon-magenta lines with glowing aura, opacity-driven flash */
  .wall {
    position: absolute;
    background: #ff007f;
    border-radius: 2px;
    opacity: 0;
    box-shadow: 0 0 0 #ff007f;
    transition: opacity 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
    /* GPU compositing hints — keep wall fades buttery during slowdowns */
    will-change: opacity, transform;
    transform: translateZ(0);
    backface-visibility: hidden;
  }
  #maze.flash .wall {
    opacity: 1;
    box-shadow: 0 0 10px #ff007f, 0 0 5px #ff007f;
  }

  /* Start / Finish markers */
  .marker {
    position: absolute;
    border-radius: 50%;
  }
  .marker.start {
    background: radial-gradient(circle, rgba(255, 255, 255, 0.25), transparent 70%);
    border: 1px solid rgba(255, 255, 255, 0.6);
    box-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
  }
  .marker.finish {
    background: radial-gradient(circle, rgba(57, 255, 136, 0.35), transparent 70%);
    border: 1px solid #39ff88;                /* neon green */
    box-shadow: 0 0 14px #39ff88, 0 0 6px #39ff88;
    opacity: 1 !important;
    animation: finishPulse 1.8s ease-in-out infinite;
  }
  @keyframes finishPulse {
    0%, 100% { box-shadow: 0 0 10px #39ff88, 0 0 5px #39ff88; }
    50%      { box-shadow: 0 0 22px #39ff88, 0 0 12px #39ff88; }
  }

  /* ============================================================
     PLAYER (flat cream circle, no glow)
     ============================================================ */
  #player {
    position: absolute;
    border-radius: 50%;
    background: #00ffff;
    box-shadow: 0 0 12px #00ffff, 0 0 22px rgba(0, 255, 255, 0.6);
    z-index: 30;
    /* GPU compositing — prevents frame drops during the slowdown transition.
       (translateZ(0) is composed into the dynamic JS transform in render().) */
    will-change: transform, opacity;
    backface-visibility: hidden;
    transition: background 0.12s ease, box-shadow 0.12s ease;
  }
  #player.hurt {
    background: #ff2d55;
    box-shadow: 0 0 14px #ff2d55, 0 0 28px rgba(255, 45, 85, 0.7);
  }

  /* Visual-sound ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    border: 2px solid #00ffff;
    box-shadow: 0 0 10px #00ffff;
    z-index: 29;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: rippleOut 0.6s ease-out forwards;
  }
  .ripple.danger { border-color: #ff2d55; box-shadow: 0 0 10px #ff2d55; }
  .ripple.goal   { border-color: #39ff88; box-shadow: 0 0 10px #39ff88; }
  @keyframes rippleOut {
    0%   { width: 10px;  height: 10px;  opacity: 0.85; }
    100% { width: 140px; height: 140px; opacity: 0; }
  }

  /* ============================================================
     DARKNESS SPOTLIGHT (neutral matte, no tint)
     ============================================================ */
  #spotlight {
    position: absolute;
    inset: 0;
    z-index: 25;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
    background: radial-gradient(
      circle var(--spot-radius, 70px) at var(--spot-x, 50%) var(--spot-y, 50%),
      rgba(5, 5, 5, 0) 0%,
      rgba(5, 5, 5, 0.55) 55%,
      rgba(5, 5, 5, 0.98) 100%
    );
  }
  #spotlight.active { opacity: 1; }

  /* ============================================================
     VIRTUAL JOYSTICK
     ============================================================ */
  #joystick {
    position: absolute;
    z-index: 60;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 1px solid rgba(0, 255, 255, 0.35);
    transform: translate(-50%, -50%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s ease;
    display: none;
  }
  #joystick.active { display: block; opacity: 1; }
  #joy-knob {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: #00ffff;
    box-shadow: 0 0 14px #00ffff;
    transform: translate(-50%, -50%);
  }

  /* ============================================================
     HUD — lives, score, level
     ============================================================ */
  #level-tag {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 90;
    color: rgba(0, 255, 255, 0.35);
    font-size: 11px;
    letter-spacing: 0.45em;
    font-weight: 300;
    pointer-events: none;
  }

  /* ------------------------------------------------------------
     GAMEPLAY HUD VISIBILITY
     Hidden while the start/end overlay is up; fades in elegantly
     only once the engine state switches to PLAYING (body.playing).
     ------------------------------------------------------------ */
  #timer, #level-tag, #pause-btn, #flash-btn {
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }
  body.playing #timer,
  body.playing #level-tag,
  body.playing #pause-btn,
  body.playing #flash-btn {
    opacity: 1;
    visibility: visible;
  }

  /* End/victory overlay wipes gameplay layers behind it */
  body.ended #shaker,
  body.ended #flash-overlay,
  body.ended #pause-btn,
  body.ended #flash-btn {
    display: none !important;
  }

  /* ============================================================
     PAUSE BUTTON — minimalist top-left control
     ============================================================ */
  #pause-btn {
    position: absolute;
    top: 12px;
    left: 16px;
    z-index: 95;
    width: 34px;
    height: 34px;
    border-radius: 4px;
    border: 1px solid rgba(0, 255, 255, 0.5);
    background: rgba(0, 255, 255, 0.04);
    box-shadow: 0 0 8px rgba(0, 255, 255, 0.25);
    color: #00ffff;
    font-size: 16px;
    line-height: 32px;
    text-align: center;
    cursor: pointer;
    pointer-events: auto;
    transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.12s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #pause-btn:hover, #pause-btn:active {
    background: rgba(0, 255, 255, 0.12);
    box-shadow: 0 0 16px rgba(0, 255, 255, 0.5);
    transform: scale(1.06);
  }

  /* ============================================================
     PAUSE OVERLAY — centered blurred dark panel with 3 buttons
     ============================================================ */
  #pause-overlay {
    position: fixed;
    inset: 0;
    z-index: 10001;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    background: rgba(5, 5, 5, 0.80);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  #pause-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }
  #pause-overlay h1 {
    font-weight: 200;
    letter-spacing: 0.4em;
    font-size: clamp(18px, 5vw, 32px);
    text-transform: uppercase;
    color: #00ffff;
    text-shadow: 0 0 14px rgba(0, 255, 255, 0.6);
    margin-bottom: 36px;
  }
  #pause-overlay .pause-btn-list {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 260px;
  }
  #pause-overlay .pause-action {
    width: 100%;
    padding: 14px 0;
    border: 1px solid rgba(0, 255, 255, 0.45);
    border-radius: 2px;
    background: transparent;
    color: #00ffff;
    font-family: inherit;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
    cursor: pointer;
    transition: background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease, transform 0.12s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #pause-overlay .pause-action:hover, #pause-overlay .pause-action:active {
    background: rgba(0, 255, 255, 0.10);
    box-shadow: 0 0 18px rgba(0, 255, 255, 0.4), inset 0 0 10px rgba(0, 255, 255, 0.1);
    transform: scale(1.02);
  }
  /* "Give Up" button — neon magenta accent */
  #pause-overlay .pause-action.danger {
    border-color: rgba(255, 0, 127, 0.45);
    color: #ff007f;
    text-shadow: 0 0 5px rgba(255, 0, 127, 0.5);
  }
  #pause-overlay .pause-action.danger:hover, #pause-overlay .pause-action.danger:active {
    background: rgba(255, 0, 127, 0.12);
    box-shadow: 0 0 18px rgba(255, 0, 127, 0.4), inset 0 0 10px rgba(255, 0, 127, 0.1);
  }

  /* Speed / sensitivity slider row inside the pause overlay */
  .speed-row {
    width: 100%;
    max-width: 260px;
    margin-top: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .speed-row label {
    font-family: 'Roboto Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(0, 255, 255, 0.55);
    text-shadow: 0 0 4px rgba(0, 255, 255, 0.3);
  }

  /* ---- Neon range input ---- */
  #speed-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: rgba(255, 255, 255, 0.08);
    outline: none;
    cursor: pointer;
  }
  /* Track — WebKit */
  #speed-slider::-webkit-slider-runnable-track {
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(90deg, rgba(0,255,255,0.15), rgba(0,255,255,0.25));
  }
  /* Track — Firefox */
  #speed-slider::-moz-range-track {
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(90deg, rgba(0,255,255,0.15), rgba(0,255,255,0.25));
    border: none;
  }
  /* Thumb — WebKit */
  #speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #00ffff;
    border: 2px solid #050505;
    box-shadow: 0 0 10px #00ffff, 0 0 4px #00ffff;
    margin-top: -7px;
    cursor: pointer;
    transition: box-shadow 0.2s ease;
  }
  #speed-slider::-webkit-slider-thumb:active {
    box-shadow: 0 0 18px #00ffff, 0 0 8px #00ffff;
    transform: scale(1.15);
  }
  /* Thumb — Firefox */
  #speed-slider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #00ffff;
    border: 2px solid #050505;
    box-shadow: 0 0 10px #00ffff, 0 0 4px #00ffff;
    cursor: pointer;
  }
  #speed-slider::-moz-range-thumb:active {
    box-shadow: 0 0 18px #00ffff, 0 0 8px #00ffff;
  }
  /* Live value badge */
  .speed-value {
    font-family: 'Roboto Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: #00ffff;
    text-shadow: 0 0 6px rgba(0, 255, 255, 0.5);
    letter-spacing: 0.15em;
    font-variant-numeric: tabular-nums;
  }

  /* ============================================================
     PULSE (FLASH HELP) — compact header button, sits directly
     next to the Pause button in the top-left HUD bar.
     Always visible during PLAYING (controlled by HUD visibility
     rules above); no media-query gating needed.
     ============================================================ */
  #flash-btn {
    position: absolute;
    top: 12px;
    left: 58px;                    /* 16px (pause left) + 34px (pause width) + 8px gap */
    z-index: 95;
    width: 34px;
    height: 34px;
    border-radius: 4px;
    border: 1px solid rgba(0, 255, 255, 0.5);
    background: rgba(0, 255, 255, 0.04);
    box-shadow: 0 0 8px rgba(0, 255, 255, 0.25);
    color: #00ffff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    pointer-events: auto;
    touch-action: manipulation;
    transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.12s ease, border-color 0.2s ease, color 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  #flash-btn:hover, #flash-btn:active {
    background: rgba(0, 255, 255, 0.12);
    box-shadow: 0 0 16px rgba(0, 255, 255, 0.5);
    transform: scale(1.06);
  }
  #flash-btn svg { width: 18px; height: 18px; display: block; }
  #flash-btn .icon-stroke { stroke: currentColor; }

  /* depleted (no charges left) */
  #flash-btn.depleted {
    border-color: rgba(255, 45, 85, 0.5);
    color: #ff2d55;
    box-shadow: none;
    opacity: 0.5;
  }

  /* charge count badge — sits on the top-right corner of the compact button */
  #flash-btn .count {
    position: absolute;
    top: -5px;
    right: -5px;
    min-width: 14px;
    height: 14px;
    padding: 0 2px;
    border-radius: 7px;
    background: #050505;
    border: 1px solid #00ffff;
    color: #00ffff;
    font-size: 8px;
    font-weight: 600;
    line-height: 12px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  #flash-btn.depleted .count { border-color: rgba(255, 45, 85, 0.5); color: #ff2d55; }

  /* Red shake feedback when tapped with no charges left */
  #flash-btn.empty-shake { animation: pulseEmpty 0.4s ease-out; }
  @keyframes pulseEmpty {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    50% { transform: translateX(3px); }
    75% { transform: translateX(-2px); }
  }

  /* Manual flash uses the same wall-illumination styling as the loop flash */
  #maze.manual-flash .wall {
    opacity: 1;
    box-shadow: 0 0 10px #ff007f, 0 0 5px #ff007f;
  }

  /* Live count-up timer (top-right) */
  #timer {
    position: absolute;
    top: 12px;
    right: 16px;
    z-index: 90;
    color: #00ffff;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-shadow: 0 0 8px rgba(0, 255, 255, 0.6);
    pointer-events: none;
    /* tabular figures so digits don't jump while ticking */
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1;
  }
  /* Victory stat lines */
  .stat-line {
    font-size: clamp(11px, 2.6vw, 14px);
    letter-spacing: 0.18em;
    color: rgba(234, 252, 255, 0.55);
    margin-bottom: 8px;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1;
  }
  .stat-line b { color: #00ffff; font-weight: 500; text-shadow: 0 0 8px rgba(0, 255, 255, 0.55); }
  .stat-line.final {
    font-size: clamp(15px, 4vw, 22px);
    letter-spacing: 0.22em;
    color: rgba(234, 252, 255, 0.8);
    margin: 18px 0 28px;
  }
  .stat-line.final b { color: #39ff88; text-shadow: 0 0 14px rgba(57, 255, 136, 0.7); }

  /* ============================================================
     SCREENS (start / end)
     ============================================================ */
  .screen {
    position: absolute;
    inset: 0;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5, 5, 5, 0.92);
    text-align: center;
    transition: opacity 0.5s ease;
    padding: 24px;
  }
  /* End screen: pure velvet black, above every gameplay layer */
  #end-overlay {
    z-index: 10000;
    background: #050505;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }
  .screen.gone   { display: none; }

  .screen h1 {
    font-weight: 200;
    letter-spacing: 0.35em;
    font-size: clamp(22px, 6vw, 44px);
    text-transform: uppercase;
    margin-bottom: 8px;
    color: #00ffff;
    text-shadow: 0 0 18px rgba(0, 255, 255, 0.7), 0 0 6px rgba(0, 255, 255, 0.5);
  }
  .screen h2 {
    font-weight: 200;
    letter-spacing: 0.25em;
    font-size: clamp(13px, 3vw, 18px);
    color: #ff007f;
    text-shadow: 0 0 12px rgba(255, 0, 127, 0.6);
    margin-bottom: 30px;
    text-transform: uppercase;
  }
  .screen p {
    font-weight: 300;
    font-size: clamp(12px, 3vw, 15px);
    line-height: 1.9;
    color: rgba(234, 252, 255, 0.6);
    max-width: 420px;
    margin-bottom: 34px;
  }
  .screen .btn {
    pointer-events: auto;
    cursor: pointer;
    padding: 15px 46px;
    border: 1px solid #00ffff;
    border-radius: 2px;        /* sharp, rectangular — matches maze geometry */
    color: #00ffff;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    font-size: 13px;
    font-family: inherit;
    background: transparent;
    transition: background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
  }
  .screen .btn:hover, .screen .btn:active {
    background: #00ffff;
    color: #050505;
    box-shadow: 0 0 24px #00ffff;
  }
  /* Victory — "PULSE SECURED" in neon cyan */
  .screen.victory h1 { color: #00ffff; text-shadow: 0 0 18px rgba(0, 255, 255, 0.7), 0 0 6px rgba(0, 255, 255, 0.5); }
  .screen.victory h2 { color: #00ffff; text-shadow: 0 0 12px rgba(0, 255, 255, 0.55); }



  /* ============================================================
     REPLAY BUTTON — sharp, glowing, with translucent fill on press
     ============================================================ */
  .btn.replay {
    border-width: 1px;
    border-radius: 2px;
    text-shadow: 0 0 5px currentColor;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.35), inset 0 0 8px rgba(0, 255, 255, 0.08);
    transition: background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease, transform 0.12s ease;
  }
  .btn.replay:hover, .btn.replay:active {
    background: rgba(0, 255, 255, 0.12);
    color: #fff;
    box-shadow: 0 0 22px rgba(0, 255, 255, 0.6), inset 0 0 14px rgba(0, 255, 255, 0.18);
    transform: scale(1.03);
  }
  /* Victory replay glows cyan */
  .screen.victory .btn.replay { border-color: #00ffff; color: #00ffff; box-shadow: 0 0 10px rgba(0,255,255,0.35), inset 0 0 8px rgba(0,255,255,0.08); }
  .screen.victory .btn.replay:hover, .screen.victory .btn.replay:active {
    background: rgba(0, 255, 255, 0.12); color: #fff;
    box-shadow: 0 0 22px rgba(0, 255, 255, 0.6), inset 0 0 14px rgba(0, 255, 255, 0.18);
  }


  .screen .final-score {
    font-size: clamp(14px, 4vw, 20px);
    letter-spacing: 0.3em;
    margin-bottom: 28px;
    font-weight: 300;
    color: rgba(234, 252, 255, 0.65);
  }
  .screen .final-score b {
    color: #00ffff;
    font-weight: 500;
    text-shadow: 0 0 12px rgba(0, 255, 255, 0.7);
  }

  /* Goal flash */
  #flash-overlay {
    position: absolute;
    inset: 0;
    z-index: 150;
    background: #39ff88;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
  }
  #flash-overlay.flash { opacity: 0.35; }

  /* ============================================================
     MOVEMENT HINT — tutorial overlay for touch/mobile ONLY.
     Hidden on desktop (hover pointer detected). Auto-dismisses
     on the first touch interaction.
     ============================================================ */
  #movement-hint {
    /* Hidden by default — desktop users with keyboard never see it */
    display: none;
    position: fixed;
    inset: 0;
    z-index: 80;               /* above maze/spotlight, below HUD (90+) */
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    pointer-events: none;
    opacity: 0.85;
    transition: opacity 0.4s ease, visibility 0.4s ease;
    animation: hintPulse 2.4s ease-in-out infinite;
  }
  /* Reveal on touch-primary devices (phones, tablets) */
  @media (hover: none) and (pointer: coarse) {
    #movement-hint { display: flex; }
  }
  @media (max-width: 768px) {
    #movement-hint { display: flex; }
  }
  #movement-hint.dismissed {
    opacity: 0;
    visibility: hidden;
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.85; }
    50%      { opacity: 0.4; }
  }
  #movement-hint .hint-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;

<body>

<script>
"use strict";

/* ============================================================================
   UTILS
   ============================================================================ */
const Utils = {
  clamp: (v, min, max) => Math.max(min, Math.min(max, v)),
  rand: (n) => Math.floor(Math.random() * n)
};

/* ============================================================================
   EVENT BUS — central custom-event dispatcher
   ============================================================================ */
class EventBus extends EventTarget {
  emit(name, detail) { this.dispatchEvent(new CustomEvent(name, { detail })); }
  on(name, cb) { this.addEventListener(name, cb); }
}

/* ============================================================================
   GAME STATE
   ============================================================================ */
const GameState = Object.freeze({
  MENU: 'MENU',
  PLAYING: 'PLAYING',
  PAUSED: 'PAUSED',
  GAMEOVER: 'GAMEOVER'
});

/* ============================================================================
   MAZE GENERATOR — perfect maze via iterative randomized DFS.
   Grid is tailored to the viewport aspect ratio (tall on mobile, wide on desktop).
   ============================================================================ */
class MazeGenerator {
  constructor() {
    this.cols = 0;
    this.rows = 0;
    this.cells = [];
    this.start = { c: 0, r: 0 };
    this.finish = { c: 0, r: 0 };
  }

  configure(vw, vh, level) {
    const portrait = vh >= vw;
    const longAxis = 9 + Math.min(level, 8);
    const aspect = portrait ? vh / vw : vw / vh;
    const shortAxis = Math.max(6, Math.round(longAxis / aspect));
    this.cols = portrait ? shortAxis : longAxis;
    this.rows = portrait ? longAxis : shortAxis;
    return this;
  }

  index(c, r) { return r * this.cols + c; }

  generate() {
    const total = this.cols * this.rows;
    this.cells = new Array(total);
    for (let r = 0; r < this.rows; r++) {
      for (let c = 0; c < this.cols; c++) {
        this.cells[this.index(c, r)] = {
          c, r,
          walls: { N: true, E: true, S: true, W: true },
          visited: false
        };
      }
    }

    const stack = [];
    let current = this.cells[0];
    current.visited = true;
    let visited = 1;

    while (visited < total) {
      const next = this._nextNeighbor(current);
      if (next) {
        this._removeWall(current, next);
        next.visited = true;
        visited++;
        stack.push(current);
        current = next;
      } else if (stack.length) {
        current = stack.pop();
      } else {
        break;
      }
    }

    this.start = { c: 0, r: 0 };
    this.finish = { c: this.cols - 1, r: this.rows - 1 };
    return this;
  }

  _nextNeighbor(cell) {
    const { c, r } = cell;
    const out = [];
    if (r > 0 && !this.cells[this.index(c, r - 1)].visited) out.push(this.cells[this.index(c, r - 1)]);
    if (c < this.cols - 1 && !this.cells[this.index(c + 1, r)].visited) out.push(this.cells[this.index(c + 1, r)]);
    if (r < this.rows - 1 && !this.cells[this.index(c, r + 1)].visited) out.push(this.cells[this.index(c, r + 1)]);
    if (c > 0 && !this.cells[this.index(c - 1, r)].visited) out.push(this.cells[this.index(c - 1, r)]);
    return out.length ? out[Utils.rand(out.length)] : null;
  }

  _removeWall(a, b) {
    const dx = b.c - a.c, dy = b.r - a.r;
    if (dx === 1)      { a.walls.E = false; b.walls.W = false; }
    else if (dx === -1){ a.walls.W = false; b.walls.E = false; }
    else if (dy === 1) { a.walls.S = false; b.walls.N = false; }
    else if (dy === -1){ a.walls.N = false; b.walls.S = false; }
  }
}

/* ============================================================================
   TIMER ENGINE — periodic flash cycle: FLASH (walls visible) + DASH (dark).
   FLASH is fixed at 2s. DASH is dynamic — scaled per level by the GameEngine
   via setDashDuration(ms) for progressive difficulty.
   Emits "flash:on" / "flash:off" and drives the progress bar via rAF.
   ============================================================================ */
class TimerEngine {
  constructor(bus) {
    this.bus = bus;
    this.FLASH_MS = 2000;
    this.DASH_MS = 8000;                           // baseline (Level 1)
    this.CYCLE_MS = this.FLASH_MS + this.DASH_MS;
    this.running = false;
    this.phase = null;
    this.cycleStart = 0;
    this._raf = null;
    this._tick = this._tick.bind(this);
  }

  /** Update the dark-phase length (drives progressive difficulty per level). */
  setDashDuration(ms) {
    this.DASH_MS = Math.max(0, ms | 0);
    this.CYCLE_MS = this.FLASH_MS + this.DASH_MS;
  }

  start() {
    if (this.running) return;
    this.running = true;
    this._enterFlash(performance.now());
    this._raf = requestAnimationFrame(this._tick);
  }

  stop() {
    this.running = false;
    if (this._raf) cancelAnimationFrame(this._raf);
    this._raf = null;
  }

  reset() {
    // Each level begins with a planning flash.
    this._enterFlash(performance.now());
  }

  _enterFlash(now) {
    this.phase = 'flash';
    this.cycleStart = now;
    this.bus.emit('flash:on');
  }

  _enterDash() {
    this.phase = 'dash';
    this.bus.emit('flash:off');
  }

  _tick(now) {
    if (!this.running) return;
    const elapsed = now - this.cycleStart;

    if (this.phase === 'flash' && elapsed >= this.FLASH_MS) this._enterDash();
    else if (this.phase === 'dash' && elapsed >= this.CYCLE_MS) this._enterFlash(now);

    const ratio = Utils.clamp((this.CYCLE_MS - elapsed) / this.CYCLE_MS, 0, 1);
    this.bus.emit('timer:progress', { ratio });

    this._raf = requestAnimationFrame(this._tick);
  }
}

/* ============================================================================
   STAGE TIMER — high-precision count-up for the current level.
   Runs fully independent of the flash cycle (TimerEngine). Tracks pure
   elapsed time in milliseconds — no artificial penalties or modifications.
   Pauses when the player reaches the finish.
   ============================================================================ */
class StageTimer {
  constructor() {
    this.elapsed = 0;        // ms accumulated while running
    this.running = false;
    this._startStamp = 0;
  }

  reset() {
    this.elapsed = 0;
    this.running = false;
    this._startStamp = 0;
  }

  start() {
    if (this.running) return;
    this.running = true;
    this._startStamp = performance.now();
  }

  pause() {
    if (!this.running) return;
    this.elapsed += performance.now() - this._startStamp;
    this.running = false;
  }

  /** Total live time in ms = accumulated + current run. Pure clock. */
  get totalMs() {
    const live = this.running ? performance.now() - this._startStamp : 0;
    return this.elapsed + live;
  }

  get totalSeconds() { return this.totalMs / 1000; }

  /** Format ms as MM:SS.cc (centiseconds). */
  static format(ms) {
    if (ms < 0) ms = 0;
    const totalCs = Math.floor(ms / 10);
    const cs = totalCs % 100;
    const totalSec = Math.floor(totalCs / 100);
    const sec = totalSec % 60;
    const min = Math.floor(totalSec / 60);
    const pad = (n) => String(n).padStart(2, '0');
    return `${pad(min)}:${pad(sec)}.${pad(cs)}`;
  }
}

/* ============================================================================
   PLAYER — continuous velocity movement with per-axis AABB wall collision.
   Position is stored in maze-space pixels.
   ============================================================================ */
class Player {
  constructor(el, maze) {
    this.el = el;
    this.maze = maze;
    this.geom = null;
    this.x = 0;
    this.y = 0;
    this.vx = 0;              // direction vector: -1, 0, or 1 per axis
    this.vy = 0;
    this.speed = 0;           // px per second (set from geometry)
    this.radius = 6;
    this.onCollision = null;
    this._lastCollide = 0;
  }

  setGeometry(geom, speedMultiplier = 7) {
    this.geom = geom;
    this.radius = geom.radius;
    // Speed in px/sec, delta-time driven. The multiplier controls cells/sec:
    //   Desktop (keyboard) → 7 cells/sec — fast, competitive.
    //   Mobile  (joystick) → 4.5 cells/sec — smooth, precise control.
    this.speed = geom.cellSize * speedMultiplier;
    this.el.style.width = geom.radius * 2 + 'px';
    this.el.style.height = geom.radius * 2 + 'px';
  }

  spawnAtStart() {
    const cs = this.geom.cellSize;
    this.x = this.maze.start.c * cs + cs / 2;
    this.y = this.maze.start.r * cs + cs / 2;
    this.vx = this.vy = 0;
    this.render();
  }

  /**
   * Set the directional input. Values are clamped to a unit circle.
   * Keyboard: always ±1 per axis (instant full speed).
   * Joystick: normalized to ±1 once past the deadzone (instant full speed).
   */
  setInput(vx, vy) {
    const mag = Math.hypot(vx, vy);
    if (mag > 1) { vx /= mag; vy /= mag; }
    this.vx = vx;
    this.vy = vy;
  }

  /**
   * @param {number} dt — seconds elapsed since last frame (from rAF delta).
   * Movement is frame-rate independent: identical speed on 60Hz, 120Hz, or
   * a stuttering mobile browser.
   */
  update(dt) {
    if (this.vx === 0 && this.vy === 0) return;
    const step = this.speed * dt;
    const movedX = this._tryMove(this.vx * step, 0);
    const movedY = this._tryMove(0, this.vy * step);
    if (!movedX && !movedY) this._reportCollision();
    this.render();
  }

  _tryMove(dx, dy) {
    if (dx === 0 && dy === 0) return false;
    const nx = this.x + dx, ny = this.y + dy;
    if (this._collides(nx, ny)) { this._reportCollision(); return false; }
    this.x = nx;
    this.y = ny;
    return true;
  }

  _reportCollision() {
    const now = performance.now();
    if (now - this._lastCollide > 220) {
      this._lastCollide = now;
      if (this.onCollision) this.onCollision();
    }
  }

  _collides(nx, ny) {
    const cs = this.geom.cellSize;
    const r = this.radius * 0.82;
    const totalW = this.maze.cols * cs;
    const totalH = this.maze.rows * cs;

    if (nx - r < 0 || ny - r < 0 || nx + r > totalW || ny + r > totalH) return true;

    const minC = Math.floor((nx - r) / cs), maxC = Math.floor((nx + r) / cs);
    const minR = Math.floor((ny - r) / cs), maxR = Math.floor((ny + r) / cs);
    const pad = 0.5;

    for (let rr = minR; rr <= maxR; rr++) {
      for (let cc = minC; cc <= maxC; cc++) {
        if (cc < 0 || rr < 0 || cc >= this.maze.cols || rr >= this.maze.rows) continue;
        const w = this.maze.cells[rr * this.maze.cols + cc].walls;
        const left = cc * cs, top = rr * cs, right = left + cs, bottom = top + cs;
        const overlapV = (ny + r) > top && (ny - r) < bottom;
        const overlapH = (nx + r) > left && (nx - r) < right;
        if (w.W && cc > 0 && (nx - r) < left + pad && overlapV) return true;
        if (w.E && cc < this.maze.cols - 1 && (nx + r) > right - pad && overlapV) return true;
        if (w.N && rr > 0 && (ny - r) < top + pad && overlapH) return true;
        if (w.S && rr < this.maze.rows - 1 && (ny + r) > bottom - pad && overlapH) return true;
      }
    }
    return false;
  }

  cell() {
    const cs = this.geom.cellSize;
    return { c: Math.floor(this.x / cs), r: Math.floor(this.y / cs) };
  }

  render() {
    const { offsetX, offsetY } = this.geom;
    const px = offsetX + this.x, py = offsetY + this.y;
    // translate3d → forces the player onto its own GPU compositing layer
    this.el.style.transform =
      `translate3d(${px - this.radius}px, ${py - this.radius}px, 0)`;
    const root = document.documentElement.style;
    root.setProperty('--spot-x', (px / window.innerWidth * 100) + '%');
    root.setProperty('--spot-y', (py / window.innerHeight * 100) + '%');
  }
}

/* ============================================================================
   VIRTUAL JOYSTICK — dynamic floating joystick under the thumb (bottom half).
   ============================================================================ */
class VirtualJoystick {
  constructor(root, knob, onVector) {
    this.root = root;
    this.knob = knob;
    this.onVector = onVector;
    this.maxRadius = 50;
    this.active = false;
    this.touchId = null;
    this.originX = 0;
    this.originY = 0;
    window.addEventListener('touchstart', (e) => this._onStart(e), { passive: false });
    window.addEventListener('touchmove', (e) => this._onMove(e), { passive: false });
    window.addEventListener('touchend', (e) => this._onEnd(e), { passive: false });
    window.addEventListener('touchcancel', (e) => this._onEnd(e), { passive: false });
  }

  _onStart(e) {
    if (this.active) return;
    const t = e.changedTouches[0];
    if (t.clientY < window.innerHeight * 0.42) return;
    // Ignore touches on interactive controls (menu, pause, PULSE button).
    if (e.target.closest && e.target.closest('.btn, #flash-btn, #pause-overlay, #pause-btn, .pause-action')) return;
    e.preventDefault();
    this.active = true;
    this.touchId = t.identifier;
    this.originX = t.clientX;
    this.originY = t.clientY;
    this.root.style.left = this.originX + 'px';
    this.root.style.top = this.originY + 'px';
    this.root.classList.add('active');
    this._setKnob(0, 0);
  }

  _onMove(e) {
    if (!this.active) return;
    const t = this._find(e.changedTouches);
    if (!t) return;
    e.preventDefault();
    let dx = t.clientX - this.originX;
    let dy = t.clientY - this.originY;
    const dist = Math.hypot(dx, dy);

    // Clamp the visual knob to the outer ring
    if (dist > this.maxRadius) { dx = dx / dist * this.maxRadius; dy = dy / dist * this.maxRadius; }
    this._setKnob(dx, dy);

    // Tiny 5px deadzone — once past it, output a fully normalized ±1
    // direction vector so the ball instantly hits max speed.
    // No proportional scaling = instant responsiveness.
    const dead = 5;
    if (dist < dead) {
      this.onVector(0, 0);
    } else {
      this.onVector(dx / dist, dy / dist);
    }
  }

  _onEnd(e) {
    if (!this.active || !this._find(e.changedTouches)) return;
    this.active = false;
    this.touchId = null;
    this.root.classList.remove('active');
    this.onVector(0, 0);
  }

  _find(list) {
    for (const t of list) if (t.identifier === this.touchId) return t;
    return null;
  }

  _setKnob(dx, dy) {
    this.knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  }
}

/* ============================================================================
   KEYBOARD CONTROLLER — Arrow keys / WASD.
   ============================================================================ */
class KeyboardController {
  constructor(onVector) {
    this.onVector = onVector;
    this.keys = { up: false, down: false, left: false, right: false };
    window.addEventListener('keydown', (e) => this._set(e, true));
    window.addEventListener('keyup', (e) => this._set(e, false));
  }

  _set(e, val) {
    let changed = true;
    switch (e.key.toLowerCase()) {
      case 'arrowup': case 'w': this.keys.up = val; break;
      case 'arrowdown': case 's': this.keys.down = val; break;
      case 'arrowleft': case 'a': this.keys.left = val; break;
      case 'arrowright': case 'd': this.keys.right = val; break;
      default: changed = false;
    }
    if (changed) {
      e.preventDefault();
      this.onVector(
        (this.keys.right ? 1 : 0) - (this.keys.left ? 1 : 0),
        (this.keys.down ? 1 : 0) - (this.keys.up ? 1 : 0)
      );
    }
  }
}

/* ============================================================================
   SCORE MANAGER — pure time-based performance scoring (speedrun model).
   Score = max(0, BASE_POINTS - elapsedSeconds * TIME_PENALTY).
   ============================================================================ */
class ScoreManager {
  constructor() {
    this.BASE_POINTS = 5000;       // perfect-run base for each level
    this.TIME_PENALTY = 100;       // points lost per elapsed second
    this.reset();
  }

  reset() { this.total = 0; }

  computeLevelScore(elapsedSeconds) {
    return Math.max(0, Math.round(this.BASE_POINTS - elapsedSeconds * this.TIME_PENALTY));
  }

  bankLevel(score) { this.total += Math.max(0, Math.round(score)); }
}

/* ============================================================================
   UI MANAGER — screen transitions + HUD rendering.
   ============================================================================ */
class UIManager {
  constructor(dom) { this.dom = dom; }

  _show(el) {
    el.classList.remove('gone');
    void el.offsetWidth;            // reflow so fade-in fires
    el.classList.remove('hidden');
  }

  _hide(el) {
    el.classList.add('hidden');
    setTimeout(() => { if (el.classList.contains('hidden')) el.classList.add('gone'); }, 520);
  }

  hideAll() {
    this._hide(this.dom.overlay);
    this._hide(this.dom.endOverlay);
    this.hidePause();
  }

  /** Victory-only end screen (no defeat path in speedrun model). */
  showVictory(stats) {
    const ov = this.dom.endOverlay;
    ov.classList.remove('defeat');
    ov.classList.add('victory');
    this.dom.statTime.textContent = StageTimer.format(stats.elapsedMs);
    this.dom.statScore.textContent = stats.score.toLocaleString() + ' PTS';
    document.body.classList.add('ended');
    this._hide(this.dom.overlay);
    this._show(ov);
  }

  showPause()  { this.dom.pauseOverlay.classList.add('active'); }
  hidePause()  { this.dom.pauseOverlay.classList.remove('active'); }

  showHint()    { this.dom.movementHint.classList.remove('dismissed'); }
  dismissHint() { this.dom.movementHint.classList.add('dismissed'); }

  /** Render the remaining flash charges on the mobile button badge/state. */
  renderCharges(charges, max) {
    if (this.dom.flashCount) this.dom.flashCount.textContent = charges;
    this.dom.flashBtn.classList.toggle('depleted', charges <= 0);
  }

  /** Subtle red feedback on the pulse button when triggered with none left. */
  signalEmptyCharges() {
    const b = this.dom.flashBtn;
    b.classList.add('depleted');
    b.classList.remove('empty-shake');
    void b.offsetWidth;
    b.classList.add('empty-shake');
    setTimeout(() => b.classList.remove('empty-shake'), 420);
  }

  /** Live count-up timer in the top-right corner. */
  renderTimer(ms) {
    this.dom.timer.textContent = StageTimer.format(ms);
  }

  setLevelTag(level) {
    this.dom.levelTag.textContent = 'LEVEL ' + String(level).padStart(2, '0');
  }
}

/* ============================================================================
   GAME ENGINE — orchestrates loop, levels, state, scoring & feedback.
   ============================================================================ */
class GameEngine {
  constructor() {
    this.bus = new EventBus();
    this.maze = new MazeGenerator();
    this.timer = new TimerEngine(this.bus);

    this.dom = {
      shaker: document.getElementById('shaker'),
      mazeEl: document.getElementById('maze'),
      playerEl: document.getElementById('player'),
      spotlight: document.getElementById('spotlight'),
      progress: document.getElementById('progress-bar'),
      overlay: document.getElementById('overlay'),
      endOverlay: document.getElementById('end-overlay'),
      statTime: document.getElementById('stat-time'),
      statScore: document.getElementById('stat-score'),
      startBtn: document.getElementById('start-btn'),
      replayBtn: document.getElementById('replay-btn'),
      pauseBtn: document.getElementById('pause-btn'),
      pauseOverlay: document.getElementById('pause-overlay'),
      pauseResume: document.getElementById('pause-resume'),
      pauseRestart: document.getElementById('pause-restart'),
      pauseQuit: document.getElementById('pause-quit'),
      levelTag: document.getElementById('level-tag'),
      flashOverlay: document.getElementById('flash-overlay'),
      joystick: document.getElementById('joystick'),
      knob: document.getElementById('joy-knob'),
      timer: document.getElementById('timer'),
      flashBtn: document.getElementById('flash-btn'),
      flashCount: document.querySelector('#flash-btn .count'),
      movementHint: document.getElementById('movement-hint'),
      speedSlider: document.getElementById('speed-slider'),
      speedValue: document.getElementById('speed-value')
    };

    this.MAX_LEVELS = 5;
    this.MAX_CHARGES = 3;
    this.MANUAL_FLASH_MS = 5000;     // manual illumination duration (5s)

    // --- Progressive darkness scaler -------------------------------------
    // Level 1 darkness = 8s; +1.5s each subsequent level.
    this.DARKNESS_BASE_MS = 8000;
    this.DARKNESS_STEP_MS = 1500;

    this.level = 1;
    this.state = GameState.MENU;
    this.geom = null;
    this._transitioning = false;

    // Flash-help power-up state (independent of the periodic loop)
    this.charges = this.MAX_CHARGES;
    this._manualFlashActive = false;
    this._manualFlashTimeout = null;

    // Platform detection — gates the tutorial hint and speed tuning.
    this._isTouchDevice = ('ontouchstart' in window || navigator.maxTouchPoints > 0);
    this._hintActive = false;

    // Mobile joystick needs gentler speed for precise control;
    // desktop keyboard gets a faster competitive baseline.
    this.SPEED_MULTIPLIER = this._isTouchDevice ? 4.5 : 7;

    // Sync the pause-menu speed slider to the platform default
    this.dom.speedSlider.value = this.SPEED_MULTIPLIER;
    this.dom.speedValue.textContent = this.SPEED_MULTIPLIER.toFixed(1);

    this.score = new ScoreManager();
    this.stageTimer = new StageTimer();
    this.ui = new UIManager(this.dom);
    this.player = new Player(this.dom.playerEl, this.maze);

    this.kbVec = { x: 0, y: 0 };
    this.joyVec = { x: 0, y: 0 };
    this._lastFrameTime = 0;    // rAF timestamp for delta-time calculation

    this._loop = this._loop.bind(this);
    this._initControls();
    this._initEvents();
  }

  get running() { return this.state === GameState.PLAYING; }

  _initControls() {
    this.keyboard = new KeyboardController((vx, vy) => {
      this.kbVec = { x: vx, y: vy };
      this._applyInput();
    });
    this.joystick = new VirtualJoystick(this.dom.joystick, this.dom.knob, (vx, vy) => {
      this.joyVec = { x: vx, y: vy };
      this._applyInput();
    });
  }

  _applyInput() {
    const vx = this.kbVec.x || this.joyVec.x;
    const vy = this.kbVec.y || this.joyVec.y;
    this.player.setInput(vx, vy);

    // Dismiss the movement hint on the very first real input
    if (this._hintActive && (vx !== 0 || vy !== 0)) {
      this._hintActive = false;
      this.ui.dismissHint();
    }
  }

  _initEvents() {
    this.dom.startBtn.addEventListener('click', () => this.start());
    this.dom.replayBtn.addEventListener('click', () => this.start());
    this.dom.pauseBtn.addEventListener('click', () => this.togglePause());
    this.dom.pauseResume.addEventListener('click', () => this.resume());
    this.dom.pauseRestart.addEventListener('click', () => this.restartLevel());
    this.dom.pauseQuit.addEventListener('click', () => this.quitToMenu());

    // Speed slider — updates SPEED_MULTIPLIER live from the pause menu.
    // The new value is applied immediately when the game resumes/restarts.
    this.dom.speedSlider.addEventListener('input', (e) => {
      this.SPEED_MULTIPLIER = parseFloat(e.target.value);
      this.dom.speedValue.textContent = this.SPEED_MULTIPLIER.toFixed(1);
      // Hot-apply to the player so the change is felt instantly upon resume
      if (this.player.geom) {
        this.player.speed = this.player.geom.cellSize * this.SPEED_MULTIPLIER;
      }
    });

    this.bus.on('flash:on', () => {
      this.dom.mazeEl.classList.add('flash');
      this.dom.spotlight.classList.remove('active');
      this.dom.progress.classList.remove('dash');
    });

    this.bus.on('flash:off', () => {
      this.dom.mazeEl.classList.remove('flash');
      this.dom.progress.classList.add('dash');
      // Keep darkness hidden if a manual flash is currently illuminating.
      if (!this._manualFlashActive) this.dom.spotlight.classList.add('active');
    });

    this.bus.on('timer:progress', (e) => {
      this.dom.progress.style.transform = `scaleX(${e.detail.ratio})`;
    });

    this.player.onCollision = () => this._onCollision();

    // Flash-help (Spacebar) and pause toggle (Escape).
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.key === ' ') {
        e.preventDefault();
        if (!e.repeat) this._triggerManualFlash();
      }
      if (e.code === 'Escape' || e.key === 'Escape') {
        e.preventDefault();
        if (!e.repeat) this.togglePause();
      }
    }, { passive: false });

    // Touch (snappy) + click (desktop fallback) for the mobile PULSE button.
    this.dom.flashBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      this._triggerManualFlash();
    }, { passive: false });
    this.dom.flashBtn.addEventListener('click', (e) => {
      e.preventDefault();
      this._triggerManualFlash();
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) this.pause();
      else this.resume();
    });

    let rt;
    window.addEventListener('resize', () => {
      clearTimeout(rt);
      rt = setTimeout(() => {
        if (this.state === GameState.PLAYING || this.state === GameState.PAUSED) this._rebuildLayout();
      }, 250);
    });
  }

  /* ---- Lifecycle ---- */
  start() {
    this.ui.hideAll();
    this.level = 1;
    this._transitioning = false;
    this.score.reset();
    this._clearManualFlash();
    this.charges = this.MAX_CHARGES;
    this.ui.renderCharges(this.charges, this.MAX_CHARGES);
    this.state = GameState.PLAYING;
    document.body.classList.remove('ended');
    document.body.classList.add('playing');
    this._buildLevel();
    this.timer.start();
    this.stageTimer.start();
    this._lastFrameTime = performance.now();
    requestAnimationFrame(this._loop);
  }

  togglePause() {
    if (this.state === GameState.PLAYING) {
      this.pause();
      this.ui.showPause();
    } else if (this.state === GameState.PAUSED) {
      this.resume();
    }
  }

  pause() {
    if (this.state !== GameState.PLAYING) return;
    this.state = GameState.PAUSED;
    this.timer.stop();
    this.stageTimer.pause();
    this._clearManualFlash();
    this.player.setInput(0, 0);
    this.kbVec = { x: 0, y: 0 };
    this.joyVec = { x: 0, y: 0 };
  }

  resume() {
    if (this.state !== GameState.PAUSED) return;
    this.ui.hidePause();
    this.state = GameState.PLAYING;
    this.timer.start();
    this.stageTimer.start();
    this._lastFrameTime = performance.now();
    requestAnimationFrame(this._loop);
  }

  restartLevel() {
    if (this.state !== GameState.PAUSED) return;
    this.ui.hidePause();
    this.state = GameState.PLAYING;
    this._clearManualFlash();
    this.charges = this.MAX_CHARGES;
    this.ui.renderCharges(this.charges, this.MAX_CHARGES);
    this._buildLevel();
    this.timer.start();
    this._lastFrameTime = performance.now();
    requestAnimationFrame(this._loop);
  }

  quitToMenu() {
    this.state = GameState.MENU;
    this.ui.hidePause();
    this.timer.stop();
    this.stageTimer.pause();
    this._clearManualFlash();
    this.player.setInput(0, 0);
    this.kbVec = { x: 0, y: 0 };
    this.joyVec = { x: 0, y: 0 };
    document.body.classList.remove('playing', 'ended');
    this.dom.mazeEl.classList.remove('flash', 'transitioning', 'manual-flash');
    this.dom.spotlight.classList.remove('active');
    // Show the start screen
    this.dom.overlay.classList.remove('gone');
    void this.dom.overlay.offsetWidth;
    this.dom.overlay.classList.remove('hidden');
  }

  _buildLevel() {
    this.ui.setLevelTag(this.level);

    // Progressive difficulty: darkness window grows with each level.
    const dashMs = this.DARKNESS_BASE_MS + (this.level - 1) * this.DARKNESS_STEP_MS;
    this.timer.setDashDuration(dashMs);

    this.stageTimer.reset();
    this.stageTimer.start();
    this.ui.renderTimer(0);
    this.maze.configure(window.innerWidth, window.innerHeight, this.level).generate();
    this._computeGeometry();
    this._renderMaze();
    this.player.setGeometry(this.geom, this.SPEED_MULTIPLIER);
    this.player.spawnAtStart();
    this.timer.reset();

    // Show the movement hint only on touch devices
    if (this._isTouchDevice) {
      this._hintActive = true;
      this.ui.showHint();
    }
  }

  _rebuildLayout() {
    this.maze.configure(window.innerWidth, window.innerHeight, this.level).generate();
    this._computeGeometry();
    this._renderMaze();
    this.player.setGeometry(this.geom, this.SPEED_MULTIPLIER);
    this.player.spawnAtStart();
  }

  /* ---- Flash-help power-up ---- */
  _triggerManualFlash() {
    if (this.state !== GameState.PLAYING) return;

    // Already lit by the periodic loop or an active manual flash — do nothing.
    if (this.timer.phase === 'flash' || this._manualFlashActive) return;

    // No charges left — subtle red feedback, no flash.
    if (this.charges <= 0) {
      this.ui.signalEmptyCharges();
      return;
    }

    this.charges--;
    this.ui.renderCharges(this.charges, this.MAX_CHARGES);

    // Illuminate independently of the loop: a separate class + hidden spotlight.
    this._manualFlashActive = true;
    this.dom.mazeEl.classList.add('manual-flash');
    this.dom.spotlight.classList.remove('active');

    clearTimeout(this._manualFlashTimeout);
    this._manualFlashTimeout = setTimeout(() => this._endManualFlash(), this.MANUAL_FLASH_MS);
  }

  _endManualFlash() {
    this._manualFlashActive = false;
    this.dom.mazeEl.classList.remove('manual-flash');
    // Restore darkness only if the periodic loop is still in its dark phase.
    if (this.state === GameState.PLAYING && this.timer.phase === 'dash') {
      this.dom.spotlight.classList.add('active');
    }
  }

  _clearManualFlash() {
    clearTimeout(this._manualFlashTimeout);
    this._manualFlashTimeout = null;
    this._manualFlashActive = false;
    this.dom.mazeEl.classList.remove('manual-flash');
  }

  /* ---- Collision (visual juice only) ----------------------------------
     Pure unpenalized speedrun: walls block movement physically — the only
     punishment is the real-world time the player wastes navigating out.
     No timer manipulation, no speed reduction, no score mutation.
     Visual feedback fires on every contact frame for satisfying tactile feel.
     ------------------------------------------------------------------- */
  _onCollision() {
    if (this.state !== GameState.PLAYING) return;
    this._shake();
    this._ripple('danger');
    this.dom.playerEl.classList.add('hurt');
    setTimeout(() => this.dom.playerEl.classList.remove('hurt'), 200);
  }

  /* ---- Win / lose ---- */
  _checkWin() {
    const pc = this.player.cell();
    if (pc.c === this.maze.finish.c && pc.r === this.maze.finish.r) this._winLevel();
  }

  _winLevel() {
    if (this._transitioning) return;
    this._transitioning = true;

    this._clearManualFlash();
    // Stop the count-up the instant the player reaches the exit.
    this.stageTimer.pause();
    const elapsedMs = this.stageTimer.totalMs;
    const levelScore = this.score.computeLevelScore(elapsedMs / 1000);
    this.score.bankLevel(levelScore);

    // Snapshot stats for the end overlay (last level wins the game).
    this._lastStats = { elapsedMs, score: levelScore };

    this.dom.flashOverlay.classList.add('flash');
    setTimeout(() => this.dom.flashOverlay.classList.remove('flash'), 160);
    this._ripple('goal');

    this.dom.mazeEl.classList.add('transitioning');
    this.dom.spotlight.classList.remove('active');

    if (this.level >= this.MAX_LEVELS) {
      setTimeout(() => this._gameOver(), 650);
      return;
    }

    setTimeout(() => {
      this.level++;
      this._buildLevel();
      this.dom.mazeEl.classList.remove('transitioning');
      this._transitioning = false;
    }, 650);
  }

  _gameOver() {
    this.state = GameState.GAMEOVER;
    document.body.classList.remove('playing');
    this.timer.stop();
    this.stageTimer.pause();
    this._clearManualFlash();
    this.player.setInput(0, 0);
    this.kbVec = { x: 0, y: 0 };
    this.joyVec = { x: 0, y: 0 };
    this.dom.mazeEl.classList.remove('flash', 'transitioning');
    this.dom.spotlight.classList.remove('active');
    this.ui.showVictory(this._lastStats || { elapsedMs: 0, score: 0 });
  }

  /* ---- Rendering ---- */
  _computeGeometry() {
    const vw = window.innerWidth, vh = window.innerHeight;
    const margin = Math.min(vw, vh) * 0.06;
    const cellSize = Math.floor(Math.min((vw - margin * 2) / this.maze.cols, (vh - margin * 2) / this.maze.rows));
    const totalW = cellSize * this.maze.cols;
    const totalH = cellSize * this.maze.rows;
    this.geom = {
      cellSize,
      wallThick: Math.max(1, Math.round(cellSize * 0.04)),
      offsetX: (vw - totalW) / 2,
      offsetY: (vh - totalH) / 2,
      radius: Math.max(4, Math.round(cellSize * 0.22)),
      totalW, totalH
    };
    document.documentElement.style.setProperty('--spot-radius', cellSize * 1.15 + 'px');
  }

  _renderMaze() {
    const g = this.geom, m = this.dom.mazeEl;
    const cs = g.cellSize, t = g.wallThick;
    m.innerHTML = '';
    m.style.width = g.totalW + 'px';
    m.style.height = g.totalH + 'px';
    m.style.left = g.offsetX + 'px';
    m.style.top = g.offsetY + 'px';

    const frag = document.createDocumentFragment();
    for (let r = 0; r < this.maze.rows; r++) {
      for (let c = 0; c < this.maze.cols; c++) {
        const cell = this.maze.cells[r * this.maze.cols + c];
        const x = c * cs, y = r * cs;
        if (cell.walls.N) frag.appendChild(this._wall(x, y, cs + t, t));
        if (cell.walls.W) frag.appendChild(this._wall(x, y, t, cs + t));
        if (c === this.maze.cols - 1 && cell.walls.E) frag.appendChild(this._wall(x + cs, y, t, cs + t));
        if (r === this.maze.rows - 1 && cell.walls.S) frag.appendChild(this._wall(x, y + cs, cs + t, t));
      }
    }
    frag.appendChild(this._marker(this.maze.start, 'start', cs));
    frag.appendChild(this._marker(this.maze.finish, 'finish', cs));
    m.appendChild(frag);
  }

  _wall(x, y, w, h) {
    const el = document.createElement('div');
    el.className = 'wall';
    el.style.left = (x - this.geom.wallThick / 2) + 'px';
    el.style.top = (y - this.geom.wallThick / 2) + 'px';
    el.style.width = w + 'px';
    el.style.height = h + 'px';
    return el;
  }

  _marker(cell, cls, cs) {
    const el = document.createElement('div');
    el.className = 'marker ' + cls;
    const sz = cs * 0.5;
    el.style.width = sz + 'px';
    el.style.height = sz + 'px';
    el.style.left = (cell.c * cs + cs / 2 - sz / 2) + 'px';
    el.style.top = (cell.r * cs + cs / 2 - sz / 2) + 'px';
    return el;
  }

  _shake() {
    const s = this.dom.shaker;
    s.classList.remove('shake');
    void s.offsetWidth;
    s.classList.add('shake');
  }

  _ripple(variant) {
    if (!this.geom) return;
    const el = document.createElement('div');
    el.className = 'ripple' + (variant ? ' ' + variant : '');
    el.style.left = (this.geom.offsetX + this.player.x) + 'px';
    el.style.top = (this.geom.offsetY + this.player.y) + 'px';
    this.dom.shaker.appendChild(el);
    setTimeout(() => el.remove(), 650);
  }

  /* ---- Main loop (delta-time driven) ---- */
  _loop(now) {
    if (!this.running) return;

    // Delta time in seconds, clamped to prevent teleportation after
    // a long pause/tab-switch (max ~3 frames at 60 fps).
    const dt = Math.min((now - this._lastFrameTime) / 1000, 0.05);
    this._lastFrameTime = now;

    this.player.update(dt);
    if (!this._transitioning) {
      this.ui.renderTimer(this.stageTimer.totalMs);
      this._checkWin();
    }
    requestAnimationFrame(this._loop);
  }
}

/* ============================================================================
   BOOTSTRAP
   ============================================================================ */
window.addEventListener('DOMContentLoaded', () => {
  window.__game = new GameEngine();
});
</script>
</body>
</html>
